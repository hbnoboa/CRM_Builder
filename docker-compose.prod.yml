services:
  # ===================
  # DATABASE (PROD)
  # ===================
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-crm_builder}
      TZ: America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-network

  # ===================
  # CACHE (PROD)
  # ===================
  redis:
    image: redis:7-alpine
    container_name: crm-redis-prod
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-network

  # ===================
  # API (NestJS)
  # ===================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: crm-api-prod
    restart: always
    environment:
      TZ: America/Sao_Paulo
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crm_builder}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-8h}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://iossystem.com.br}
      GCS_PROJECT_ID: ${GCS_PROJECT_ID:-}
      GCS_BUCKET: ${GCS_BUCKET:-}
      GCS_KEY_FILE: ${GCS_KEY_FILE:-}
      GCS_CREDENTIALS: ${GCS_CREDENTIALS:-}
      GCS_BASE_URL: ${GCS_BASE_URL:-}
      POWERSYNC_URL: https://iossystem.com.br
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - api_uploads:/app/uploads
    networks:
      - crm-network

  # ===================
  # WEB (Next.js)
  # ===================
  web:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    container_name: crm-web-prod
    restart: always
    environment:
      TZ: America/Sao_Paulo
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - crm-network

  # ===================
  # NGINX (Reverse Proxy)
  # ===================
  nginx:
    image: nginx:alpine
    container_name: crm-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      - api
      - web
    networks:
      - crm-network

  # ===================
  # DATABASE (DEV) - banco separado
  # ===================
  postgres-dev:
    image: postgres:16-alpine
    container_name: crm-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: CrmBuilderDev2026Pass
      POSTGRES_DB: crm_builder_dev
      TZ: America/Sao_Paulo
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-network

  # ===================
  # CACHE (DEV) - redis separado
  # ===================
  redis-dev:
    image: redis:7-alpine
    container_name: crm-redis-dev
    restart: unless-stopped
    volumes:
      - redis_data_dev:/data
    command: redis-server --appendonly yes --requirepass RedisDevPass2026
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "RedisDevPass2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm-network

  # ===================
  # DEV API (NestJS)
  # ===================
  api-dev:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: crm-api-dev
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:CrmBuilderDev2026Pass@postgres-dev:5432/crm_builder_dev?schema=public
      REDIS_URL: redis://:RedisDevPass2026@redis-dev:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-8h}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      CORS_ORIGIN: https://dev.iossystem.com.br
      GCS_PROJECT_ID: ${GCS_PROJECT_ID:-}
      GCS_BUCKET: ${GCS_BUCKET:-}
      GCS_KEY_FILE: ${GCS_KEY_FILE:-}
      GCS_CREDENTIALS: ${GCS_CREDENTIALS:-}
      GCS_BASE_URL: ${GCS_BASE_URL:-}
      POWERSYNC_URL: https://iossystem.com.br
    depends_on:
      postgres-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - api_uploads_dev:/app/uploads
    networks:
      - crm-network

  # ===================
  # DEV WEB (Next.js)
  # ===================
  web-dev:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    container_name: crm-web-dev
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      NODE_ENV: production
    depends_on:
      api-dev:
        condition: service_healthy
    networks:
      - crm-network

volumes:
  postgres_data:
    external: true
    name: crm-builder_postgres_data
  postgres_data_dev:
  redis_data:
  redis_data_dev:
  api_uploads:
  api_uploads_dev:

networks:
  crm-network:
    driver: bridge
