# PowerSync self-hosted service for CRM Builder mobile app.
# Provides real-time sync between PostgreSQL and Flutter (SQLite).
#
# Usage:
#   docker compose -f docker-compose.powersync.yml --env-file .env.production up -d
#
# Prerequisites:
#   - PostgreSQL must have wal_level=logical enabled
#   - JWT_SECRET must match the NestJS API JWT secret
#
# IMPORTANT: How to generate PS_JWT_SECRET_B64
# =============================================
# PS_JWT_SECRET_B64 must be the base64url encoded version of JWT_SECRET.
# The JWT tokens are signed with kid='crm-builder-key' which must match
# the JWKS key in powersync.yaml.
#
# Generate it with:
#   echo -n "YOUR_JWT_SECRET_VALUE" | base64 | tr '+/' '-_' | tr -d '='
#
# Example: If JWT_SECRET is "super-secret-key-32-characters!!"
#   echo -n "super-secret-key-32-characters!!" | base64 | tr '+/' '-_' | tr -d '='
#   Result: c3VwZXItc2VjcmV0LWtleS0zMi1jaGFyYWN0ZXJzISE
#
# Then set: PS_JWT_SECRET_B64=c3VwZXItc2VjcmV0LWtleS0zMi1jaGFyYWN0ZXJzISE

services:
  powersync-mongo:
    image: mongo:7
    container_name: crm-powersync-mongo
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - powersync-mongo-data:/data/db
    networks:
      - crm-network

  powersync:
    image: journeyapps/powersync-service:latest
    container_name: crm-powersync
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      PS_REPLICATION_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crm_builder}?sslmode=disable
      PS_MONGO_URI: mongodb://powersync-mongo:27017/powersync?replicaSet=rs0
      # IMPORTANTE: Este valor deve ser o base64url do JWT_SECRET do backend NestJS
      # Gere com: echo -n "$JWT_SECRET" | base64 | tr '+/' '-_' | tr -d '='
      PS_JWT_SECRET_B64: ${PS_JWT_SECRET_B64}
      PS_API_TOKEN: powersync-crm-admin-token
    volumes:
      - ./apps/mobile/powersync.yaml:/app/powersync.yaml:ro
    depends_on:
      - powersync-mongo
    networks:
      - crm-network

volumes:
  powersync-mongo-data:

networks:
  crm-network:
    external: true
    name: crm-builder_crm-network
